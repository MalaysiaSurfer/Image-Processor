name: Build Windows

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install MinGW
        run: choco install mingw -y

      - name: Build C++
        run: |
          mkdir build_ci
          cd build_ci
          cmake .. -G "MinGW Makefiles"
          mingw32-make image_processor

      - name: Install Python deps
        run: pip install pyinstaller customtkinter pillow

      - name: Build exe
        run: |
          copy build_ci\image_processor.exe .
          pyinstaller --onefile --windowed --add-binary "image_processor.exe;." gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageProcessor-windows
          path: dist/