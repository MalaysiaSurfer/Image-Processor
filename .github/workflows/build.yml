name: Build

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build C++
        run: |
          mkdir -p build_ci
          cd build_ci
          cmake ..
          make image_processor

      - name: Install Python deps
        run: pip3 install --break-system-packages pyinstaller customtkinter pillow

      - name: Build app
        run: |
          pyinstaller --onefile --windowed \
          --add-binary "build_ci/image_processor:." \
          --hidden-import tkinter \
          --hidden-import tkinter.filedialog \
          --collect-all customtkinter \
          gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageProcessor-mac
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install MinGW
        run: choco install mingw -y

      - name: Build C++
        run: |
          mkdir build_ci
          cd build_ci
          cmake .. -G "MinGW Makefiles"
          mingw32-make image_processor

      - name: Install Python deps
        run: pip install pyinstaller customtkinter pillow

      - name: Build exe
        run: |
          copy build_ci\image_processor.exe .
          pyinstaller --onefile --windowed --add-binary "image_processor.exe;." gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageProcessor-windows
          path: dist/